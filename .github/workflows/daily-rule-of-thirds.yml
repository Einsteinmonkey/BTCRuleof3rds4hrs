name: BTC Multi-Timeframe Rule of Thirds

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. Runs shortly after each 15-minute BTC candle closes.
    - cron: "5,20,35,50 * * * *"

permissions:
  contents: write

jobs:
  calculate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Calculate BTC/USDT Multi-Timeframe Rule of Thirds
        run: python calculate_rule_of_thirds.py

      - name: Commit updated results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html results/
          if git diff --cached --quiet; then
            echo "No result changes to commit."
          else
            git commit -m "Update BTC/USDT multi-timeframe rule of thirds"
            git push
          fi
