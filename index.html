<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BTC/USDT 4H Rule of Thirds</title>

    :root { --bg:#0b0f14; --card:#151a21; --border:#2a3441; --text:#f6f8fb; --muted:#a7b1c2; --accent:#f7931a; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:radial-gradient(circle at top,#182230 0,#0b0f14 42%); color:var(--text); font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    .card { width:min(850px,calc(100% - 32px)); background:rgba(21,26,33,.94); border:1px solid var(--border); border-radius:22px; padding:32px; box-shadow:0 24px 80px rgba(0,0,0,.35); }
    h1 { margin:0 0 18px; font-size:clamp(2.1rem,5vw,4rem); letter-spacing:-.05em; line-height:1; }
    .box { background:#0f141b; border:1px solid var(--border); border-radius:16px; padding:20px; color:var(--muted); }
    code { color:#ffd199; }
  </style>
</head>
<body>
  <main class="card">
    <h1>BTC/USDT Rule of Thirds</h1>
